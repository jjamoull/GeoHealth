spring.application.name=webgis

# Max size of file uploaded and sent
spring.servlet.multipart.max-file-size=100MB
spring.servlet.multipart.max-request-size=100MB

# DataBase Connection
spring.datasource.url=jdbc:postgresql://${DB_HOST:localhost}:5432/geohealthdb
spring.datasource.username=${DB_USER}
spring.datasource.password=${DB_PASSWORD}

# JPA SetUp
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# JWT Configuration
jwt.secret=${JWT_SECRET}
jwt.expiration.seconds=3600

# Cookie Configuration
cookie.secure=${COOKIE_SECURE:false}

# Super Admin Secret
superadmin.secret=${SUPERADMIN_SECRET}

# Urls configuration
frontend.url=${FRONTEND_URL:http://localhost:4200}

# Script path
script.path =${SCRIPT_PATH}
