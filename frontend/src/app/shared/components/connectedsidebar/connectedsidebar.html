<link
  rel="stylesheet"
  href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
/>


<input type="checkbox" id="check" [checked]="isOpen" (change)="isOpen = !isOpen">
<div class="btnOne">
  <label for="check">
    <img src="assets/icons/logoGeoHealth.png">
  </label>
</div>
<label class="exit-button" for="check"></label>
<div class="sidebar">
  <div class="logo-container">
    <div class="logo"></div>
    <a class="logo-text">GeoHealth</a>
  </div>
  <div class="menu">
    <ul>
      <li>
        <a (click)="goToNavigation()">
          <i class="fas fa-map"></i>
          Navigation
        </a>
      </li>
      <li>
        <a (click)="goToProfile()">
          <i class="fas fa-user"></i>
          Profile
        </a>
      </li>
      @if(isAdmin){
      <li>
        <a (click)="goToUsersList()">
          <i class="fas fa-user-shield"></i>
          Admin Panel
        </a>
      </li>
      }
      <li>
        <a (click)="logout()">
          <i class="fas fa-right-from-bracket"></i>
          Logout
        </a>
      </li>
    </ul>
  </div>
</div>
