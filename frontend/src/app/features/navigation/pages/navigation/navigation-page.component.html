<link
  rel="stylesheet"
  href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
/>
<div class="navigation-page">

<input type="checkbox" name="" id="check-nav" checked="checked">
<div class ="side-navbar">
  <div class="scrollbox">
    <div class="scrollbox-inner">
      <div class="navigation-button-container">
        @if(isAdmin){
          <app-button
            [text]="'Add a new map'"
            variant="success"
            (clicked) ="openPopUp('addMap')">
          </app-button>

          <app-button
            [text]="'Add a new risk factor'"
            variant="success"
            (clicked) = "openPopUp('addRiskFactor')">
          </app-button>
        }

      </div>
      <label for="check-nav">
        <span class ="fas fa-times" id="times"> </span>
        <span class ="fas fa-bars" id="bars"> </span>
      </label>
      <div class="search-bar-container">
        <div class="search-bar">
          <input id="map-search" name="map-search" type="search" class="search-field"  placeholder="Rechercher…" autocomplete="off">
          <button class="search-button">
            <svg  class="search-icon" xmlns="http://www.w3.org/2000/svg" width="24" height="24"
                  fill="currentColor" viewBox="0 0 24 24" >
              <!--Boxicons v3.0.8 https://boxicons.com | License  https://docs.boxicons.com/free-->
              <path d="M18 10c0-4.41-3.59-8-8-8s-8 3.59-8 8 3.59 8 8 8c1.85 0 3.54-.63 4.9-1.69l5.1 5.1L21.41 20l-5.1-5.1A8 8 0 0 0 18 10M4 10c0-3.31 2.69-6 6-6s6 2.69 6 6-2.69 6-6 6-6-2.69-6-6"></path>
            </svg>
          </button>
        </div>
      </div>
          <div class ="filter-title">
            <div class="text">Diseases</div>
          </div>
          <ol>
            <app-checkbox
              [id]="'Ebola'"
              [label]="'Ebola'"
              [name]="'souscription'">
            </app-checkbox>
            <app-checkbox
              [id]="'Covid'"
              [label]="'Covid'"
              [name]="'souscription'">
            </app-checkbox>
            <app-checkbox
              [id]="'Other'"
              [label]="'Other'"
              [name]="'souscription'">
            </app-checkbox>
            <app-checkbox
              [id]="'Other'"
              [label]="'Other'"
              [name]="'souscription'">
            </app-checkbox>
          </ol>
          <div class ="filter-title">
            <div class="text">Annotations</div>
          </div>
          <ol>
            <app-checkbox
              [id]="'Annotated'"
              [label]="'Annotated'"
              [name]="'souscription'">
            </app-checkbox>
            <app-checkbox
              [id]="'Unannotated'"
              [label]="'Unannotated'"
              [name]="'souscription'">
            </app-checkbox>
            <app-checkbox
              [id]="'Other'"
              [label]="'Other'"
              [name]="'souscription'">
            </app-checkbox>
            <app-checkbox
              [id]="'Other'"
              [label]="'Other'"
              [name]="'souscription'">
            </app-checkbox>
          </ol>
          <div class ="filter-title">
            <div class="text">Risk factors</div>
          </div>
          <ol>
            <app-checkbox
              [id]="'Cattle'"
              [label]="'Cattle'"
              [name]="'souscription'">
            </app-checkbox>
            <app-checkbox
              [id]="'Rivers'"
              [label]="'Rivers'"
              [name]="'souscription'">
            </app-checkbox>
            <app-checkbox
              [id]="'Other'"
              [label]="'Other'"
              [name]="'souscription'">
            </app-checkbox>
            <app-checkbox
              [id]="'Other'"
              [label]="'Other'"
              [name]="'souscription'">
            </app-checkbox>
          </ol>
    </div>
  </div>
</div>

  <div class="all-maps">
     <div class="recent-maps">
       <div class="rounded-card">
         <h3 class="title">Risk maps</h3>
       </div>
       <div class="all-the-maps">
         @for (map of listOfAllRecentMaps; track map.id){
           <div class="new-case" (click)="goToMap(map.id)">
             <h4 class="map-title">{{map.title}}</h4>
             <h6 class="map-description">{{map.description}}</h6>
           </div>
         }
       </div>
     </div>


      <!-- ------------------------ -->
      <!-- Lines about all the maps -->
      <!-- ------------------------ -->
    <div class="all-available-maps">
      <div class="rounded-card">
        <h3 class="title">Annotated maps</h3>
      </div>
      <div class="all-the-maps">
        @for (map of listOfAllMaps; track map.id){
          <div class="new-case" (click)="goToMap(map.id)">

            <app-map-preview [mapId]="map.id"></app-map-preview>

            <div class="preview-meta-data">
              <h4 class="map-title">{{map.title}}</h4>
              <h6 class="map-description">{{map.description}}</h6>
            </div>

          </div>

        }
      </div>
    </div>

  </div>
</div>
