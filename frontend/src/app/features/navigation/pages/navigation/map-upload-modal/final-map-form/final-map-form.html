<form [formGroup]="formGroup" (ngSubmit)="onSubmit()">

  <div class="item">
    <app-inputbox
      [type]="'text'"
      [placeholder]="'My title'"
      formControlName="title"
      [label]="'Title'">
    </app-inputbox>
    @if(isFieldValid('title')) {
    <span class="error">Title is required</span>
    }
  </div>

  <div class="item">
    <app-inputbox
      [type]="'text'"
      [placeholder]="'About the map…'"
      formControlName="description"
      [label]="'Description'">
    </app-inputbox>
    @if(isFieldValid('description')) {
    <span class="error">Description is required</span>
    }
  </div>

  <div class="item">
    <label>Zip file</label>
    <div class="file-upload">
      <button type="button" class="upload-btn" (click)="zipUpload.click()">Upload</button>
      <span class="file-name">{{ selectedZipFile?.name || 'No file uploaded yet' }}</span>
    </div>
    <input type="file" class="file-input" accept=".zip" (change)="onZipFileSelected($event)" #zipUpload>
    @if(isFieldValid('zipFile')) {
    <span class="error">Zip file is required</span>
    }
  </div>

  <div class="item">
    <label>TIF file</label>
    <div class="file-upload">
      <button type="button" class="upload-btn" (click)="tifUpload.click()">Upload</button>
      <span class="file-name">{{ selectedTifFile?.name || 'No file uploaded yet' }}</span>
    </div>
    <input type="file" class="file-input" accept=".tif,.tiff" (change)="onTifFileSelected($event)" #tifUpload>
  </div>



  <div class="checkbox">
    <div>
      <input type="radio" id="tagsDisease" name="tagsDisease" value="ebola">
      <label for="tagsDisease">  Ebola</label>
    </div>

    <div>
      <input type="radio" id="tagsDisease" name="tagsDisease" value="rift_valley_fever">
      <label for="tagsDisease" >  Rift valley fever</label>
    </div>
  </div>


  <div class="checkbox">
    <div>
      <input type="radio" id="tagsSeason" name="tagsSeason" value="dry">
      <label for="tagsSeason">  Dry </label>
    </div>

    <div>
      <input type="radio" id="tagsSeason" name="tagsSeason" value="wet">
      <label for="tagsSeason" >  Wet </label>
    </div>
  </div>



  <div class="footer">
    <button type="submit" class="submit-btn" [disabled]="formGroup.invalid || isUploading">
      Create map
    </button>
  </div>




</form>
