<div class="register-page">


<div class="register">
  <h1 class="registerTitle"> Register </h1>

  <form [formGroup]="formGroup"
        (ngSubmit)="register()"
        class="form">

  <div class="form-field">
    <app-inputbox
      [type]="'text'"
      [placeholder]="'Username'"
      formControlName="username"
      [label]="'Username'"
      [message]="'At least 3 character long.'"
      [showError]="nameLength('username')">
    </app-inputbox>


  </div>

    <app-inputbox
      [type]="'text'"
      [placeholder]="'Firstname'"
      formControlName="firstName"
      [label]="'Firstname'"
      [message]="'At least 3 character long.'"
      [showError]="nameLength('firstName')">
    </app-inputbox>

    <app-inputbox
      [type]="'text'"
      [placeholder]="'Lastname'"
      formControlName="lastName"
      [label]="'Lastname'"
      [message]="'At least 3 character long.'"
      [showError]="nameLength('lastName')">
    </app-inputbox>

    <app-inputbox
      [type]="'text'"
      [placeholder]="'Email'"
      formControlName="email"
      [label]="'Email'"
      [message]="'doesn\'t match'"
      [showError]="mailLength('email')">
    </app-inputbox>


    <app-inputbox
      [type]="'password'"
      [placeholder]="'Password'"
      formControlName="password"
      [label]="'Password'"
      [message]="'At least 8 character long'"
      [showError]="passwordLength('password')">
    </app-inputbox>

    <app-inputbox
      [type]="'password'"
      [placeholder]="'Confirm Password'"
      formControlName="confirmPassword"
      [label]="'Confirm Password'"
      [message]="'Doesn\'t match'"
      [showError]="passwordsMatch()">
    </app-inputbox>


    <div class="register-button-container">
      <app-button
        [text]="'Register'"
        variant="success">
      </app-button>
    </div>

    <div class="loginLink">
      <p>Already have an account ? <a (click)="goToLogin()">Login</a></p>
    </div>

  </form>
</div>
</div>
