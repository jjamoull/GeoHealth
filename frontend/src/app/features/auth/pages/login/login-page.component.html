<div class="login-page">
  <img class="image" src="/assets/background/loginBackgroundPlanet.png" alt="">
</div>

<div class="login">
  <div class="title-container">
    <h1 class="login-title"> Login </h1>
    <p class="login-message">Please log into your account</p>
  </div>

  <form [formGroup]="formGroup" (ngSubmit)="login()">

    <app-inputbox
      [type]="'text'"
      [placeholder]="'Your username'"
      formControlName="username"
      [label]="'Username'" >
    </app-inputbox>

    <app-inputbox
      [type]="'password'"
      [placeholder]="'Your password'"
      formControlName="password"
      [label]="'Password'" >
    </app-inputbox>


    <div class="login-button-container">
      <app-button
        [text]="'Login'"
        variant="success">
      </app-button>
    </div>

    <div class="register-link">
      <p>Don't have an account ?  <a (click)="goToRegister()">Register</a></p>
    </div>
  </form>
</div>
