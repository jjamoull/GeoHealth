<div class="login-page">


<div class="login">
  <div class="title-container">
    <h1 class="login-title"> Login </h1>
    <p class="login-message">Please log into your account</p>
  </div>

  <form [formGroup]="formGroup" (ngSubmit)="login()">

    <app-inputbox
      [type]="'text'"
      [placeholder]="'Your username'"
      formControlName="username"
      [label]="'Username'" >
    </app-inputbox>

    <app-inputbox
      [type]="'password'"
      [placeholder]="'Your password'"
      formControlName="password"
      [label]="'Password'" >
    </app-inputbox>


    <div class="login-button-container">
      <app-button
        [text]="'Login'"
        variant="success"
        [type]="'submit'">
      </app-button>
    </div>

    <div class="register-link">
      <p>Don't have an account ?  <a (click)="goToRegister()">Register</a></p>
    </div>
    <app-error-success-message
      [errorMessages]="errorMessage"
      [successMessages]="successMessage"
      [showErrors]="loginError">
    </app-error-success-message>
  </form>

</div>
</div>
