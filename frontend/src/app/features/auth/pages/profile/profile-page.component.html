<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">

<div class="profile-page">
  <div class="profile-title">
    <span class="text1">Welcome to</span>
    <span class="text2">Your profile</span>
  </div>
    <div class="container">
      <div class="card">
        <div class="profile-picture">
        <img [src]=selectedAvatar alt="Person" class="card__image">
        <div class="menu-toggle" [class.active]="profilePictureUpdate" (click)="toggleMenu()"></div>

          <div class="avatar-list" [class.active]="profilePictureUpdate">
            <ul>
              <li style="--i:0s"><img src="assets/icons/avatar1.png" class="avatar" (click)="selectAvatar('assets/icons/avatar1.png')"></li>
              <li style="--i:0s"><img src="assets/icons/avatar2.png" class="avatar" (click)="selectAvatar('assets/icons/avatar2.png')"></li>
              <li style="--i:0s"><img src="assets/icons/avatar3.png" class="avatar" (click)="selectAvatar('assets/icons/avatar3.png')"></li>
              <li style="--i:0s"><img src="assets/icons/avatar4.png" class="avatar" (click)="selectAvatar('assets/icons/avatar4.png')"></li>
            </ul>
          </div>
        </div>
        <p class="card__name">{{user.username}}</p>
        <div class="grid-container">

          <app-inputbox
            [label]="'Username'"
            [(ngModel)]="user.username"
            [disabled]="!isEditingField">
          </app-inputbox>

          <app-inputbox
            [label]="'Firstname'"
            [(ngModel)]="user.firstName"
            [disabled]="!isEditingField">
          </app-inputbox>

          <app-inputbox
            [label]="'Lastname'"
            [(ngModel)]="user.lastName"
            [disabled]="!isEditingField">
          </app-inputbox>

          <app-inputbox
            [label]="'Email'"
            [(ngModel)]="user.email"
            [disabled]="!isEditingField">
          </app-inputbox>

          @if(isEditingField){
            <app-button
              [text]="'Apply Change'"
              variant="success"
              (clicked)="updateProfile()">
            </app-button>

            <app-button
              [text]="'Cancel'"
              variant="danger"
              (clicked)="cancel()">
            </app-button>
          }
          @else if(!isEditingField){
            <app-button
              [text]="'Edit'"
              variant="success"
              (clicked)="toggleEdit()">
            </app-button>
          }
          @if (errorMessage) {
            <div class="alert alert-danger" style="margin-top: 20px;">
              {{ errorMessage }}
            </div>
          }
          @if (!showWindow){
            <app-button
              [text]="'Delete my account'"
              variant="danger"
              (clicked)="openWindow()">
            </app-button>
          }
          @if (showWindow) {
            <div class="deleteAccountWindow">
              <div class="window">
                <h3>Confirmation</h3>
                <p>Please type and validate your password to confirm</p>

                <app-inputbox
                  [type]="'password'"
                  [placeholder]="'password'"
                  [(ngModel)]="userToDelete.password"
                >
                </app-inputbox>

                <app-button
                  [text]="'Cancel'"
                  variant="success"
                  (clicked)="closeWindow()">
                </app-button>

                <app-button
                  [text]="'Delete forever'"
                  variant="danger"
                  (clicked)="delete()"
                  [disabled]="!userToDelete.password">
                </app-button>
              </div>
            </div>
          }
        </div>
        <div class="change-password-link">
          <p>You want to change your password ? <a (click)="goToChangePassword()">Change password</a></p>
        </div>

    </div>
</div>
</div>
