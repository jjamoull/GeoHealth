<div cdkDrag class="evaluation-modal">
  <div class="modal-header" cdkDragHandle>
    <h2>{{ 'evalmodal.title' | transloco }}</h2>
    <button class="close-btn" (click)="onClose()">×</button>
  </div>

  <div class="modal-content">
    <form id="evaluation-form">
      <div class="item">
        <label>{{ 'evalmodal.division' | transloco }}</label>
        <input type="text" [value]="division?.NAME_2" readonly>
      </div>

      <div class="item">
        <label>
          {{ 'evalmodal.firstcriteria' | transloco }}
          <app-tooltip-description [description]="'evalmodal.firstdescription' | transloco"/>
        </label>
        <app-rating-scaler
          name="agreementLevel"
          [options]="['4', '3', '2', '1']"
          [value]="agreementLevel?.toString() || ''"
          (valueChange)="agreementLevel = +$event">
        </app-rating-scaler>
      </div>

      <div class="item">
        <label>
          {{ 'evalmodal.secondcriteria' | transloco }}
          <app-tooltip-description [description]="'evalmodal.seconddescription' | transloco"/>
        </label>
        <app-rating-scaler
          name="certaintyLevel"
          [options]="['4', '3', '2', '1']"
          [value]="certaintyLevel?.toString() || ''"
          (valueChange)="certaintyLevel = +$event">
        </app-rating-scaler>
      </div>

      <div class="item">
        <label>
          {{ 'evalmodal.thirdcriteria' | transloco }}
          <app-tooltip-description [description]="'evalmodal.thirddescription' | transloco"/>
        </label>
        <app-rating-scaler
          name="perceivedRisk"
          [options]="['high', 'medium', 'low']"
          [value]="perceivedRisk?.toString() || ''"
          (valueChange)="perceivedRisk = $event">
        </app-rating-scaler>
      </div>

      <div class="item">
        <label>
          {{ 'evalmodal.fourthcriteria' | transloco }}
          <app-tooltip-description [description]="'evalmodal.fourthdescription' | transloco"/>
        </label>
        <app-rating-scaler
          name="isPublic"
          [options]="[isPublic ? 'Public' : 'Private']"
          [value]="isPublic ? (isPublic ? 'Public' : 'Private') : ''"
          (valueChange)="isPublic = !isPublic">
        </app-rating-scaler>
      </div>

      <div class="item">
        <label>
          {{ 'evalmodal.comment' | transloco }}
          <app-tooltip-description [description]="'evalmodal.commentdescription' | transloco"/>
        </label>
        <textarea placeholder="Enter your comment..." [(ngModel)]="comment" name="comment"></textarea>
      </div>
    </form>
  </div>

  <div class="footer">
    <app-button
      [text]="existingForm !== null ? ('evalmodal.savechangesbutton' | transloco) : ('evalmodal.savebutton' | transloco)"
      [variant]="'success'"
      (click)="onSave(isPublic)">
    </app-button>
  </div>
</div>
