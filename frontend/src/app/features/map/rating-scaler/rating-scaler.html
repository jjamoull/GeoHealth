<div class="rating-system">
  @for (option of options; track getValue(option); let i = $index) {
    <input type="radio"
           [name]="name"
           [id]="name + '_' + i"
           [checked]="getValue(option) === value"
           (change)="onSelect(option)" />

    @if(hasTraduction){
      <label [for]="name + '_' + i">
        {{ getLabel(option) | transloco }}
      </label>
    } @else {
      <label [for]="name + '_' + i">
        {{ getLabel(option)}}
      </label>
    }

  }
</div>
