<div class="legend-card">
  @if(isEbola) {
  <div class="gradient-bar ebola"></div>
  <div class="gradient-labels">
    <span>0.80</span>
    <span>0.50</span>
    <span>0.20</span>
  </div>
  }@else {
  <div class="gradient-bar rift"></div>
  <div class="gradient-labels">
    <span>High</span>
    <span>Medium</span>
    <span>Low</span>
  </div>
  }
</div>
