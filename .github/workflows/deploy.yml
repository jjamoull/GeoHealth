name: Deploy GeoHealth

on:
  pull_request:
    branches: [main]
    types: [closed, opened, synchronize]

jobs:
  deploy:
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Java
        uses: actions/setup-java@v3
        with:
          java-version: 17
          distribution: temurin

      - name: Set up Node
        uses: actions/setup-node@v3
        with:
          node-version: 20

      - name: Build Angular
        run: |
          cd frontend
          npm install
          npm run build -- --configuration production


      - name: Build Spring Boot JAR
        run: |
          cd backend
          chmod +x mvnw
          ./mvnw package -DskipTests

      - name: Copy Angular files to VM
        uses: appleboy/scp-action@v0.1.4
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USER }}
          password: ${{ secrets.PASSWORD }}
          port: ${{ secrets.PORT }}
          source: "frontend/dist/GeoHealth_Angular/browser/"
          target: "/opt/geohealth/frontend"
          strip_components: 3

      - name: Copy JAR to VM
        uses: appleboy/scp-action@v0.1.4
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USER }}
          password: ${{ secrets.PASSWORD }}
          port: ${{ secrets.PORT }}
          source: "backend/target/*.jar"
          target: "/opt/geohealth/backend"
          strip_components: 2

      - name: Copy docker-compose to VM
        uses: appleboy/scp-action@v0.1.4
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USER }}
          password: ${{ secrets.PASSWORD }}
          port: ${{ secrets.PORT }}
          source: "docker-compose.yml"
          target: "/opt/geohealth"

      - name: Restart services on VM
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USER }}
          password: ${{ secrets.PASSWORD }}
          port: ${{ secrets.PORT }}
          script: |
            cd /opt/geohealth
            docker-compose down
            docker-compose --env-file .env up -d
            sudo pkill -f webgis || true
            sleep 2
            cp /opt/geohealth/frontend/browser/index.csr.html /opt/geohealth/frontend/browser/index.html
            nohup java -jar backend/*.jar \
              --spring.profiles.active=prod \
              > /opt/geohealth/app.log 2>&1 &
